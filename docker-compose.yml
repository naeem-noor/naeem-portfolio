services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_GITHUB: ${NEXT_PUBLIC_GITHUB:-https://github.com}
        NEXT_PUBLIC_LINKEDIN: ${NEXT_PUBLIC_LINKEDIN:-https://linkedin.com}
        NEXT_PUBLIC_EMAIL: ${NEXT_PUBLIC_EMAIL:-hello@example.com}
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
